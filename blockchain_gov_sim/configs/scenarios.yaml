# 预定义场景片段。
# 当前脚本默认不直接遍历该文件，但保留它是为了后续做批量实验或论文补图更方便。
scenarios:
  stable:
    scenario:
      default_name: stable
      stable:
        type: stable
        lambda: 180
  step_load:
    scenario:
      default_name: step
      step:
        type: step
        lambda: 150
        e0: 40
        k: 2.2
  mmpp:
    scenario:
      default_name: mmpp
      mmpp:
        type: mmpp
        lambdas: [110, 200, 300]
        transition:
          - [0.82, 0.14, 0.04]
          - [0.10, 0.78, 0.12]
          - [0.05, 0.25, 0.70]
        initial_state: 1
  high_rtt:
    scenario:
      network:
        rtt_min: 30.0
        rtt_max: 85.0
  high_churn:
    scenario:
      network:
        p_off: 0.12
        p_on: 0.22

# 第四章正式训练配置。
# 用法：与 default.yaml 和场景覆盖文件叠加。
output_root: outputs/formal
run_name: train_formal

agent:
  learning_rate: 2.5e-4
  total_timesteps: 300000
  n_steps: 512
  batch_size: 128
  n_epochs: 8

eval:
  episodes: 10
  deterministic: true

study:
  formal_seed_list_hard: [42, 52, 62, 72, 82]
  formal_seed_list_moderate: [42, 52, 62]

# 第四章正式 benchmark / ablation 编排配置。
output_root: outputs/formal
run_name: formal_suite

eval:
  episodes: 12
  deterministic: true

formal:
  main_compare:
    methods:
      - Static-Param
      - Heuristic-AIMD
      - AE-PBFT-like
      - DVRC-like
      - TwoLayer-LPBFT-like
      - Ours
  malicious_scan:
    methods:
      - Static-Param
      - Heuristic-AIMD
      - AE-PBFT-like
      - DVRC-like
      - TwoLayer-LPBFT-like
      - Ours
    ratios: [0.0, 0.1, 0.2, 0.3, 0.4]
  dynamic_attacks:
    methods:
      - SingleRep-TopK-Static
      - MultiRep-TopK-Static
      - DVRC-like
      - Ours
    on_off_periods: [4, 8, 12]
    zigzag_freqs: [0.08, 0.18, 0.32]
    collusion_group_sizes: [2, 4, 6, 8]
  load_shock:
    methods:
      - Static-Param
      - Heuristic-AIMD
      - AE-PBFT-like
      - Ours
    lambda1: 160
    e0: 40
    lambda2_values: [240, 320, 400]
  high_rtt:
    methods:
      - Static-Param
      - Heuristic-AIMD
      - AE-PBFT-like
      - Ours
    rtt_max_values: [60, 80, 100, 120]
  high_churn:
    methods:
      - Static-Param
      - Heuristic-AIMD
      - AE-PBFT-like
      - Ours
    levels:
      - {name: churn_l1, p_off: 0.02, p_on: 0.20}
      - {name: churn_l2, p_off: 0.05, p_on: 0.20}
      - {name: churn_l3, p_off: 0.08, p_on: 0.22}
      - {name: churn_l4, p_off: 0.10, p_on: 0.20}
  ablation:
    seeds: [42, 52, 62]
    timesteps: 120000
    variants:
      - name: w_o_context_gate
        override:
          reputation:
            use_context_gate: false
      - name: w_o_consistency_anti_manipulation
        override:
          reputation:
            use_penalties: false
      - name: topk_instead_of_soft_sortition
        override:
          env:
            committee_method: topk
      - name: plain_ppo
        plain_ppo: true
      - name: w_o_action_mask
        override:
          env:
            mask_illegal_actions: false
      - name: single_dimension_reputation
        override:
          reputation:
            fusion_dims: [svc]
